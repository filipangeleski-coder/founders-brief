<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Founders' Briefing</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
        <style>
            :root{--black:#131313;--white:#F5F5F5;--smoke:#6B6B6B;--border:#2A2A2A;}
            *{box-sizing:border-box;}
            .staticrypt-html{height:100%;}
            .staticrypt-body{height:100%;margin:0;}
            .staticrypt-content{
                height:100%;margin:0;background:var(--black);color:var(--white);
                font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased;
            }
            .grid-bg{position:fixed;inset:0;background-image:linear-gradient(#1f1f1f 1px,transparent 1px),linear-gradient(90deg,#1f1f1f 1px,transparent 1px);background-size:60px 60px;opacity:.5;mask-image:radial-gradient(circle at 50% 38%,#000,transparent 75%);z-index:0;}
            .staticrypt-page{position:relative;z-index:1;width:380px;max-width:90vw;margin:auto;padding:0;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
            .far-mark{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:72px;letter-spacing:10px;line-height:1;margin-bottom:6px;}
            .staticrypt-form{position:relative;z-index:1;background:transparent;width:100%;padding:0;text-align:center;}
            .staticrypt-instructions{margin-bottom:30px;}
            .staticrypt-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--smoke);margin:0 0 10px;}
            .staticrypt-instructions p:last-child{font-family:'Space Grotesk',sans-serif;font-weight:400;font-size:15px;color:#9a9a9a;margin:0;line-height:1.5;}
            .staticrypt-hr{display:none;}
            .staticrypt-password-container{position:relative;background:#1A1A1A;width:100%;border:1px solid var(--border);margin:0 0 14px;}
            .staticrypt-form input[type="password"],.staticrypt-form input[type="text"]{
                background:transparent;border:0;color:var(--white);font-family:'IBM Plex Mono',monospace;
                font-size:14px;outline:0;padding:16px 44px 16px 16px;width:100%;letter-spacing:1px;
            }
            .staticrypt-form input::placeholder{color:#5a5a5a;}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:18px;width:18px;opacity:.45;padding:0;position:absolute;right:14px;top:50%;transform:translateY(-50%);filter:invert(1);}
            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--smoke);}
            .staticrypt-remember input[type="checkbox"]{transform:scale(1.2);margin-right:10px;accent-color:var(--white);}
            .staticrypt-form .staticrypt-decrypt-button{
                text-transform:uppercase;outline:0;background:var(--white);width:100%;border:0;
                padding:16px;color:var(--black);font-family:'Space Grotesk',sans-serif;font-weight:700;
                font-size:13px;letter-spacing:2px;cursor:pointer;transition:filter .15s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,.staticrypt-form .staticrypt-decrypt-button:active,.staticrypt-form .staticrypt-decrypt-button:focus{filter:brightness(85%);}
            .far-foot{margin-top:34px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#3a3a3a;}
            .hidden{display:none !important;}
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;background:var(--black);}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:0.22em solid #2A2A2A;border-right-color:var(--white);border-radius:50%;animation:spinner-border .75s linear infinite;}
            @keyframes spinner-border{100%{transform:rotate(360deg);}}
            @media screen and (-webkit-min-device-pixel-ratio:0){.staticrypt-form input[type="password"],.staticrypt-form input[type="text"]{font-size:16px;}}
        </style>
    </head>

    <body class="staticrypt-body">

                        <input type="submit" class="staticrypt-decrypt-button" value="Unlock" />
                    </form>
                </div>
                <div class="far-foot">Confidential · Founders only</div>
            </div>
        </div>
